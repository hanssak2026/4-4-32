<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poster</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #000; display:flex; align-items:center; justify-content:center; }
    .frame{position:relative;width:100%;height:100%;}
    .frame img{width:100%;height:100%;object-fit:contain;display:block;position:relative;z-index:1}
    .hotspot{position:absolute;display:block;z-index:2;cursor:pointer;background:transparent}
    .hotspot.qr{right:6%;bottom:16%;width:22%;height:22%}
    .hotspot.reg{left:6%;bottom:14%;width:40%;height:8%;color:transparent;text-indent:-9999px}
    .hotspot:focus{outline:3px solid rgba(255,255,255,0.18)}
  </style>
</head>
<body>
  <div class="frame">
    <img src="poster.png" alt="Poster">
    <!-- clickable overlay for QR and registration text -->
    <a class="hotspot qr" href="https://app.catchsecu.com/projects/8f547392a523b00/form" target="_blank" rel="noopener noreferrer" aria-label="QR 링크"></a>
    <a class="hotspot reg" href="https://app.catchsecu.com/projects/8f547392a523b00/form" target="_blank" rel="noopener noreferrer">사전등록 바로가기</a>
  </div>
</body>
</html>
